appId: com.wonder.app
productName: Wonder
copyright: "Copyright © 2026 Bruce Zhao"
icon: public/icon.ico
directories:
  output: release
files:
  - dist/
  - dist-electron/
  - dist-server/
  - node_modules/
  - package.json
  - public/
asarUnpack:
  - node_modules/better-sqlite3/**
  - dist/renderer/**
npmRebuild: false
afterPack: scripts/after-pack.js
win:
  target: dir
  signAndEditExecutable: false
  forceCodeSigning: false
  legalTrademarks: "MIT License"
  artifactName: "${productName}-${version}-Setup.${ext}"
mac:
  target: dmg
linux:
  target: AppImage
nsis:
  oneClick: false
  perMachine: true
  allowToChangeInstallationDirectory: true
